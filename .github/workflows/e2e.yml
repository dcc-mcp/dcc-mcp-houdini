name: E2E (Houdini)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  houdini-docker:
    name: Houdini Docker Hython Smoke
    runs-on: ubuntu-latest
    env:
      SIDEFX_CLIENT: ${{ secrets.SIDEFX_CLIENT }}
      SIDEFX_SECRET: ${{ secrets.SIDEFX_SECRET }}
      HOUDINI_USERNAME: ${{ secrets.HOUDINI_USERNAME }}
      HOUDINI_PASSWORD: ${{ secrets.HOUDINI_PASSWORD }}
      HOUDINI_LICENSE_MODE: ${{ vars.HOUDINI_LICENSE_MODE || 'indie' }}
      HOUDINI_IMAGE: ${{ vars.HOUDINI_IMAGE || 'sabjorn/hbuild-worker:21.0.559-base' }}
    steps:
      - uses: actions/checkout@v6

      - name: Skip when SideFX credentials are not configured
        if: env.SIDEFX_CLIENT == '' || env.SIDEFX_SECRET == ''
        run: |
          echo "Skipping live Houdini Docker E2E because SIDEFX_CLIENT/SIDEFX_SECRET are not configured."
          echo "Set repository secrets and optionally vars.HOUDINI_IMAGE to enable this workflow."

      - name: Run live Houdini E2E in Docker
        if: env.SIDEFX_CLIENT != '' && env.SIDEFX_SECRET != ''
        shell: bash
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e SIDEFX_CLIENT \
            -e SIDEFX_SECRET \
            -e HOUDINI_USERNAME \
            -e HOUDINI_PASSWORD \
            -e HOUDINI_LICENSE_MODE \
            "$HOUDINI_IMAGE" \
            /bin/bash .github/scripts/run_houdini_docker_e2e.sh
