tools:
  - name: import_to_scene
    description: "Import an asset described by an AssetDescriptor into a Houdini geo container."
    source_file: scripts/import_to_scene.py
    execution: sync
    affinity: main
    timeout_hint_secs: 180
    input_schema:
      type: object
      additionalProperties: false
      required: [descriptor]
      properties:
        descriptor:
          type: object
          additionalProperties: true
          description: AssetDescriptor dict (from dcc_mcp_core.asset_import). Must contain asset_id and variants[].local_path.
        material_mode:
          type: string
          enum: [as_authored, default_gray, skip]
          description: How to handle materials during import (default as_authored).
        placement:
          type: object
          additionalProperties: true
          description: Optional placement hint with translate/rotate/scale/parent_name.
        target_collection:
          type: string
          minLength: 1
          description: Optional parent network path to place the geo container under (e.g. /obj).
        skip_existing:
          type: boolean
          description: Skip import if asset_id is already present in the scene.
    output_schema:
      type: object
      additionalProperties: true
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    call_examples:
      - arguments:
          descriptor:
            asset_id: "props/table-round"
            variants:
              - local_path: "/data/assets/props/table_round.obj"
                format: "obj"
                preferred: true
            unit_hint: "centimeter"
            meters_per_unit: 0.01
            up_axis: "y"
          target_collection: "/obj"
        note: "Import a table asset into /obj"
