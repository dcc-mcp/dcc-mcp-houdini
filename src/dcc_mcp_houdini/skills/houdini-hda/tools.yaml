tools:
  - name: install_hda_file
    description: "Install a Houdini .hda/.otl file into the current session and return discovered definitions."
    input_schema:
      type: object
      required: [file_path]
      properties:
        file_path:
          type: string
          description: "Path to an existing .hda, .hdalc, .hdanc, .otl, or .otllc file."
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 60
    source_file: scripts/install_hda_file.py
    tool_role: action
    risk: low
    search_aliases: [install hda, load otl, register asset, add hda file]
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - houdini_hda__list_hda_definitions
        - houdini_hda__execute_hda

  - name: list_hda_definitions
    description: "List Houdini Digital Asset definitions from a specific file or all loaded HDA files."
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: "Optional HDA file path. When omitted, all loaded HDA files are scanned."
    read_only: true
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 60
    source_file: scripts/list_hda_definitions.py
    tool_role: read_only
    risk: low
    search_aliases: [list hda, hda definitions, available assets, otl contents]
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true

  - name: execute_hda
    description: >-
      Install an optional HDA file, create an HDA node, set parameters, press
      button parms, cook it, and return the resulting node path. Mutates the
      scene and is the preferred typed HDA automation entry point.
    input_schema:
      type: object
      required: [operator_name]
      properties:
        operator_name:
          type: string
          description: "HDA operator type name to create."
        parent_path:
          type: string
          default: "/obj"
          description: "Parent network path."
        node_name:
          type: string
          description: "Optional node name."
        hda_file:
          type: string
          description: "Optional HDA/OTL file to install before node creation."
        parameters:
          type: object
          description: "Parameter name to value map applied after creation."
          additionalProperties: true
        press_buttons:
          type: array
          items:
            type: string
          default: []
          description: "Button parameter names to press after parameter assignment."
        cook:
          type: boolean
          default: true
          description: "Cook the HDA node after setup."
        force_cook:
          type: boolean
          default: false
          description: "Force a cook when cook is true."
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 300
    source_file: scripts/execute_hda.py
    tool_role: action
    risk: medium
    search_aliases: [execute hda, run hda, instantiate asset, use digital asset]
    produces: [scene_node]
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    next-tools:
      on-success:
        - houdini_nodes__layout_children
      on-failure:
        - houdini_hda__list_hda_definitions

  - name: promote_hda_parameters
    description: >-
      Promote parameter tuples from child nodes onto an unlocked HDA or subnet
      interface and create native channel references back to the public controls.
    input_schema:
      type: object
      required: [node_path, promotions]
      properties:
        node_path:
          type: string
          description: "Unlocked HDA instance or subnet that owns the public interface."
        promotions:
          type: array
          minItems: 1
          description: "Internal parameter tuples to expose on the asset interface."
          items:
            type: object
            required: [source_node_path, source_parm]
            properties:
              source_node_path:
                type: string
                description: "Path to a child node inside node_path."
              source_parm:
                type: string
                description: "Source parameter tuple name."
              name:
                type: string
                description: "Optional public parameter name; defaults to source_parm."
              label:
                type: string
                description: "Optional public label; defaults to the source label."
            additionalProperties: false
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 60
    source_file: scripts/promote_hda_parameters.py
    tool_role: action
    risk: medium
    search_aliases: [promote hda parameter, expose hda control, create hda interface, link internal parameter]
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    next-tools:
      on-success:
        - houdini_hda__save_node_as_hda
        - houdini_hda__update_hda_definition
      on-failure:
        - houdini_parameters__list_parms

  - name: update_hda_definition
    description: >-
      Publish unlocked instance contents into its HDA definition, set the
      definition version, and optionally match the instance to the new definition.
    input_schema:
      type: object
      required: [node_path, version]
      properties:
        node_path:
          type: string
          description: "Existing HDA instance whose definition will be updated."
        version:
          type: string
          description: "Non-empty definition version metadata."
        update_contents:
          type: boolean
          default: true
          description: "Publish unlocked instance contents before setting the version."
        match_current:
          type: boolean
          default: true
          description: "Match and lock the instance to the updated definition."
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 120
    source_file: scripts/update_hda_definition.py
    tool_role: action
    risk: high
    search_aliases: [update hda definition, publish hda changes, bump hda version, save hda definition]
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
    next-tools:
      on-success:
        - houdini_hda__sync_hda_instance
      on-failure:
        - houdini_hda_automation__inspect_hda_definition

  - name: sync_hda_instance
    description: >-
      Reload or install an optional HDA library, match an instance to its current
      definition, and run the asset's native version synchronization handler.
    input_schema:
      type: object
      required: [node_path, from_version]
      properties:
        node_path:
          type: string
          description: "HDA instance to synchronize."
        from_version:
          type: string
          description: "Previous instance version passed to the SyncNodeVersion handler."
        hda_file:
          type: string
          description: "Optional HDA/OTL library to install or reload first."
        match_current:
          type: boolean
          default: true
          description: "Match the instance to the loaded current definition."
        sync_delayed:
          type: boolean
          default: true
          description: "Load delayed definition contents before synchronization."
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 120
    source_file: scripts/sync_hda_instance.py
    tool_role: action
    risk: high
    search_aliases: [sync hda instance, upgrade hda instance, match current definition, run hda version handler]
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
    next-tools:
      on-success:
        - houdini_hda_automation__validate_hda
      on-failure:
        - houdini_hda_automation__inspect_hda_definition

  - name: save_node_as_hda
    description: >-
      Create a Houdini Digital Asset from an existing node and save it to an
      HDA file. Mutates the source node type and writes a file.
    input_schema:
      type: object
      required: [node_path, hda_file_path, hda_name]
      properties:
        node_path:
          type: string
          description: "Source node path to convert into an HDA."
        hda_file_path:
          type: string
          description: "Destination HDA file path."
        hda_name:
          type: string
          description: "Operator name for the new digital asset."
        label:
          type: string
          description: "Human-readable HDA label/description."
        version:
          type: string
          description: "Optional asset version string."
        save_as_embedded:
          type: boolean
          default: false
          description: "Save embedded in hip instead of only writing to hda_file_path."
    read_only: false
    destructive: false
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 300
    source_file: scripts/save_node_as_hda.py
    tool_role: action
    risk: medium
    search_aliases: [save hda, create digital asset, export hda, make otl]
    produces: ["file:hda"]
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false

  - name: author_hda_interface
    description: >-
      Declaratively author a safe HDA/subnet parameter interface with folders,
      numeric ranges, toggles, strings, static menus, and native channel
      promotion. Executable callbacks and menu-generator scripts are rejected.
    input_schema:
      type: object
      required: [node_path, templates]
      properties:
        node_path:
          type: string
          description: "HDA instance or subnet that owns the parameter interface."
        templates:
          type: array
          minItems: 1
          description: "Safe declarative parameter templates; folder entries may contain child entries."
          items:
            type: object
            required: [type, name]
            additionalProperties: false
            properties:
              type:
                type: string
                enum: [folder, float, int, toggle, string, menu]
              name:
                type: string
              label:
                type: string
              help:
                type: string
              components:
                type: integer
                minimum: 1
                maximum: 4
                default: 1
              default:
                description: "Scalar or component list; menu defaults use a declared token or zero-based index."
              min:
                type: number
              max:
                type: number
              min_is_strict:
                type: boolean
                default: false
              max_is_strict:
                type: boolean
                default: false
              items:
                type: array
                items:
                  type: object
                  required: [token]
                  additionalProperties: false
                  properties:
                    token: {type: string}
                    label: {type: string}
              children:
                type: array
                items: {type: object}
              promotion:
                type: object
                required: [source_node_path, source_parm]
                additionalProperties: false
                properties:
                  source_node_path: {type: string}
                  source_parm: {type: string}
        conflict_policy:
          type: string
          enum: [error, replace]
          default: error
          description: "Reject existing top-level names, or explicitly replace them."
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 120
    source_file: scripts/author_hda_interface.py
    tool_role: action
    risk: high
    search_aliases: [author hda interface, create hda controls, hda parameter template, promote hda control]
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
    next-tools:
      on-success:
        - houdini_hda__publish_hda_library
      on-failure:
        - houdini_parameters__get_parm_templates

  - name: publish_hda_library
    description: >-
      Publish an existing HDA definition under an explicit namespace and
      version, with an explicit conflict policy, icon/help, safe dcc_mcp/
      metadata sections, dependency manifest, and bounded embedded resources.
      Event-handler and arbitrary executable sections are not accepted.
    input_schema:
      type: object
      required: [node_path, hda_file_path, namespace, asset_name, version]
      additionalProperties: false
      properties:
        node_path:
          type: string
        hda_file_path:
          type: string
        namespace:
          type: string
        asset_name:
          type: string
        version:
          type: string
        label:
          type: string
        icon:
          type: string
          description: "Houdini icon name or search-path reference."
        help_text:
          type: string
          description: "Static embedded Help section text."
        dependencies:
          type: array
          items: {type: string}
          default: []
        custom_sections:
          type: object
          description: "Static text sections whose names must start with dcc_mcp/."
          additionalProperties: {type: string}
        embedded_resources:
          type: array
          default: []
          items:
            type: object
            required: [file_path, section_name]
            additionalProperties: false
            properties:
              file_path: {type: string}
              section_name:
                type: string
                description: "Relative name stored below dcc_mcp/resources/."
        conflict_policy:
          type: string
          enum: [error, overwrite]
          default: error
        update_contents:
          type: boolean
          default: true
          description: "Publish unlocked instance contents before copying the definition."
        install:
          type: boolean
          default: true
          description: "Install the published library in the current Houdini session."
        make_preferred:
          type: boolean
          default: false
          description: "Mark the installed definition preferred; requires install=true."
    read_only: false
    destructive: true
    idempotent: false
    execution: sync
    affinity: main
    timeout_hint_secs: 300
    source_file: scripts/publish_hda_library.py
    tool_role: action
    risk: high
    search_aliases: [publish hda library, version hda, namespace hda, embed hda resources, hda manifest]
    produces: ["file:hda"]
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
    next-tools:
      on-success:
        - houdini_hda__validate_hda_contract
      on-failure:
        - houdini_hda__list_hda_definitions

  - name: validate_hda_contract
    description: >-
      Validate an HDA definition's namespace/version, safe parameter interface,
      required sections, dependency/resource manifest, and exact temporary
      instantiation. Returns structured diagnostics and removes the probe node.
    input_schema:
      type: object
      required: [node_type_name]
      additionalProperties: false
      properties:
        node_type_name:
          type: string
        hda_file:
          type: string
          description: "Optional HDA file to inspect and temporarily install for instantiation."
        expected_version:
          type: string
        required_parameters:
          type: array
          default: []
          items:
            type: object
            required: [name]
            additionalProperties: false
            properties:
              name: {type: string}
              type:
                type: string
                enum: [folder, float, int, toggle, string, menu]
        required_sections:
          type: array
          items: {type: string}
          default: []
        require_namespace:
          type: boolean
          default: true
        require_type_version:
          type: boolean
          default: true
        require_manifest:
          type: boolean
          default: false
        check_dependencies:
          type: boolean
          default: true
        instantiate:
          type: boolean
          default: true
        parent_path:
          type: string
          default: /obj
    read_only: false
    destructive: false
    idempotent: true
    execution: sync
    affinity: main
    timeout_hint_secs: 120
    source_file: scripts/validate_hda_contract.py
    tool_role: action
    risk: medium
    search_aliases: [validate hda contract, check hda interface, verify hda dependencies, test hda instantiation]
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    next-tools:
      on-success:
        - houdini_hda__execute_hda
      on-failure:
        - houdini_hda_automation__inspect_hda_definition
