tools:
  - name: scan_hda_libraries
    description: List loaded HDA library files and their definition node types (read-only).
    source_file: scripts/scan_hda_libraries.py
    execution: sync
    affinity: main
    group: hda-query
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      properties: {}
  - name: inspect_hda_definition
    description: >-
      Inspect an HDA definition: inputs, parm templates, sections, version, and
      library path (read-only). Optionally install a .hda/.otl file first.
    source_file: scripts/inspect_hda_definition.py
    execution: sync
    affinity: main
    group: hda-query
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [node_type_name]
      properties:
        node_type_name:
          type: string
        hda_file:
          type: string
  - name: instantiate_hda
    description: >-
      Create an HDA instance, wire inputs, set parameters, cook, and report
      generated nodes plus cook errors.
    source_file: scripts/instantiate_hda.py
    execution: async
    affinity: main
    timeout_hint_secs: 120
    group: hda-edit
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [parent_path, node_type_name]
      properties:
        parent_path:
          type: string
        node_type_name:
          type: string
        hda_file:
          type: string
        node_name:
          type: string
        parameters:
          type: object
          description: name -> value (lists target parm tuples).
        inputs:
          type: array
          items: {type: string}
        cook:
          type: boolean
          default: true
  - name: validate_hda
    description: >-
      Cook an HDA node (optional) and report errors, warnings, and a pass/fail
      verdict.
    source_file: scripts/validate_hda.py
    execution: async
    affinity: main
    timeout_hint_secs: 120
    group: hda-query
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [node_path]
      properties:
        node_path:
          type: string
        cook:
          type: boolean
          default: true
  - name: cook_top_network
    description: >-
      Cook a TOP/PDG node (optionally blocking) and report work-item count and
      errors.
    source_file: scripts/cook_top_network.py
    execution: async
    affinity: main
    timeout_hint_secs: 600
    group: pdg-rop
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [node_path]
      properties:
        node_path:
          type: string
        block:
          type: boolean
          default: true
  - name: execute_rop_chain
    description: >-
      Render a ROP with its upstream output-driver dependencies (or just itself
      when ignore_inputs is set) and report errors.
    source_file: scripts/execute_rop_chain.py
    execution: async
    affinity: main
    timeout_hint_secs: 600
    group: pdg-rop
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        ignore_inputs:
          type: boolean
          default: false
