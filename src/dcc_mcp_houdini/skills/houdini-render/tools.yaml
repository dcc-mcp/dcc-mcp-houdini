tools:
  - name: capture_viewport
    description: >-
      Capture the current Scene Viewer to an image file for a single frame via
      flipbook, with clamped resolution. UI-aware (headless returns a warning).
    source_file: scripts/capture_viewport.py
    execution: async
    affinity: main
    timeout_hint_secs: 120
    group: viewport
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [output_path]
      properties:
        output_path:
          type: string
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
          description: "[width, height], clamped to 4096."
        frame:
          type: number
  - name: flipbook
    description: >-
      Flipbook the current viewport across a frame range to image files (use a
      $F token in output_path). UI-aware.
    source_file: scripts/flipbook.py
    execution: async
    affinity: main
    timeout_hint_secs: 600
    group: viewport
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [output_path, frame_range]
      properties:
        output_path:
          type: string
          description: "Image path, ideally with a frame token e.g. /tmp/fb.$F4.jpg."
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
  - name: get_render_settings
    description: >-
      Read renderer, camera, resolution, frame range, output path, and image
      format from a ROP node. Read-only.
    source_file: scripts/get_render_settings.py
    execution: sync
    affinity: main
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
  - name: set_render_settings
    description: >-
      Set camera, resolution (clamped), frame range, output path, and image
      format on a ROP node. Reports unsupported fields for the ROP type.
    source_file: scripts/set_render_settings.py
    execution: sync
    affinity: main
    group: render
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        camera:
          type: string
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        output_path:
          type: string
        image_format:
          type: string
  - name: render_rop
    description: >-
      Render a ROP/output driver and report written files, elapsed time,
      warnings/errors. Async with a long timeout hint to avoid hanging the host.
    source_file: scripts/render_rop.py
    execution: async
    affinity: main
    timeout_hint_secs: 1800
    group: render
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        background:
          type: boolean
          default: false
          description: Launch an isolated hython job and return immediately, keeping the Houdini UI responsive.
  - name: get_render_job
    description: Read status, elapsed time, and written files for a background ROP render job.
    source_file: scripts/get_render_job.py
    execution: sync
    affinity: any
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: string
  - name: create_render_layer
    description: >-
      Create a render layer (Render Product in Solaris /stage or merge in ROP
      context) with optional AOVs. Supports Solaris and traditional networks.
    source_file: scripts/create_render_layer.py
    execution: sync
    affinity: main
    group: render_layer
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parent_path:
          type: string
          default: /stage
        aovs:
          type: array
          items: {type: string}
        purpose:
          type: string
          default: beauty
  - name: configure_aovs
    description: >-
      Add or remove AOVs (diffuse, specular, normal, depth, motionvector, etc.)
      on a ROP or Solaris render product. Supports 15+ preset AOV types.
    source_file: scripts/configure_aovs.py
    execution: sync
    affinity: main
    group: render
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path, aovs]
      properties:
        rop_path:
          type: string
        aovs:
          type: array
          items: {type: string}
        action:
          type: string
          enum: [add, remove]
          default: add
  - name: manage_takes
    description: >-
      Create, switch, delete, or list takes. Takes isolate parameter overrides
      for render layer / lighting variant workflows.
    source_file: scripts/manage_takes.py
    execution: sync
    affinity: main
    group: render_layer
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [list, create, switch, delete]
        take_name:
          type: string
  - name: get_render_stats
    description: >-
      Read render statistics (resolution, samples, renderer, output, frame
      range) from a ROP node or the current Houdini session.
    source_file: scripts/get_render_stats.py
    execution: sync
    affinity: main
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      properties:
        rop_path:
          type: string
