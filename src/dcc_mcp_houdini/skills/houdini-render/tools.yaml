tools:
  - name: capture_viewport
    description: >-
      Capture the current Scene Viewer to an image file for a single frame via
      flipbook, with clamped resolution. UI-aware (headless returns a warning).
    source_file: scripts/capture_viewport.py
    execution: async
    affinity: main
    timeout_hint_secs: 120
    group: viewport
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [output_path]
      properties:
        output_path:
          type: string
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
          description: "[width, height], clamped to 4096."
        frame:
          type: number
  - name: flipbook
    description: >-
      Flipbook the current viewport across a frame range to image files (use a
      $F token in output_path). Supports an optional frame increment and an
      explicit camera. UI-aware.
    source_file: scripts/flipbook.py
    execution: async
    affinity: main
    timeout_hint_secs: 600
    group: viewport
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [output_path, frame_range]
      properties:
        output_path:
          type: string
          description: "Image path, ideally with a frame token e.g. /tmp/fb.$F4.jpg."
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
          description: "[start, end, optional positive increment]."
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
        camera_path:
          type: string
          description: "Optional camera node to activate before capture."
  - name: get_render_settings
    description: >-
      Read renderer, camera, resolution, frame range, output path, and image
      format from a ROP node. Read-only.
    source_file: scripts/get_render_settings.py
    execution: sync
    affinity: main
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
  - name: set_render_settings
    description: >-
      Set camera, resolution (clamped), frame range, output path, and image
      format on a ROP node. Reports unsupported fields for the ROP type.
    source_file: scripts/set_render_settings.py
    execution: sync
    affinity: main
    group: render
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        camera:
          type: string
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        output_path:
          type: string
        image_format:
          type: string
  - name: validate_karma_stage
    description: >-
      Read-only preflight of a composed Solaris USD Stage for known Karma
      instance-property and RenderVar pixel-filter diagnostics. Reports the
      Houdini host build and actionable fixes without changing the scene.
    source_file: scripts/validate_karma_stage.py
    execution: sync
    affinity: main
    group: render
    read_only: true
    destructive: false
    idempotent: true
    tool_role: read_only
    risk: low
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [lop_path]
      properties:
        lop_path:
          type: string
          description: Absolute path of the LOP node whose composed USD Stage is validated.
        renderer:
          type: string
          enum: [karma_xpu, karma_cpu]
          default: karma_xpu
  - name: render_rop
    description: >-
      Render a ROP/output driver and report written files, elapsed time,
      warnings/errors. Interactive Houdini defaults to an isolated job so the
      UI stays responsive; headless Houdini defaults to foreground execution.
    source_file: scripts/render_rop.py
    execution: async
    affinity: main
    timeout_hint_secs: 1800
    group: render
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        background:
          type: boolean
          description: >-
            Explicitly select isolated hython (true) or foreground (false)
            execution. When omitted, interactive Houdini uses an isolated job
            and headless Houdini renders in the foreground. Explicit headless
            isolation saves the existing HIP before spawning the worker.
  - name: get_render_job
    description: >-
      Read bounded status, output progress, elapsed time, and ETA for a background
      ROP render/cache/chain job. Set include_details only when full internal
      output and warning lists plus traceback data are required. The bounded
      summary includes warning_count and at most ten individually truncated
      recent_warnings.
    source_file: scripts/get_render_job.py
    execution: sync
    affinity: any
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: string
        include_details:
          type: boolean
          default: false
          description: Include full expected/output snapshots, written-file and warning lists, errors, and traceback data. The default response is bounded.
  - name: cancel_render_job
    description: Cancel a background ROP render/cache/chain job owned by the current adapter process. Repeated calls are safe.
    source_file: scripts/cancel_render_job.py
    execution: sync
    affinity: any
    timeout_hint_secs: 10
    group: render
    read_only: false
    destructive: true
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: true
    input_schema:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: string
  - name: create_render_layer
    description: >-
      Create a render layer (Render Product in Solaris /stage or merge in ROP
      context) with optional AOVs. Supports Solaris and traditional networks.
    source_file: scripts/create_render_layer.py
    execution: sync
    affinity: main
    group: render_layer
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parent_path:
          type: string
          default: /stage
        aovs:
          type: array
          items: {type: string}
        purpose:
          type: string
          default: beauty
  - name: configure_aovs
    description: >-
      Add or remove AOVs (diffuse, specular, normal, depth, motionvector, etc.)
      on a ROP or Solaris render product. Supports 15+ preset AOV types.
    source_file: scripts/configure_aovs.py
    execution: sync
    affinity: main
    group: render
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path, aovs]
      properties:
        rop_path:
          type: string
        aovs:
          type: array
          items: {type: string}
        action:
          type: string
          enum: [add, remove]
          default: add
  - name: manage_takes
    description: >-
      Create, switch, delete, or list takes. Takes isolate parameter overrides
      for render layer / lighting variant workflows.
    source_file: scripts/manage_takes.py
    execution: sync
    affinity: main
    group: render_layer
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [list, create, switch, delete]
        take_name:
          type: string
  - name: get_render_stats
    description: >-
      Read render statistics (resolution, samples, renderer, output, frame
      range) from a ROP node or the current Houdini session.
    source_file: scripts/get_render_stats.py
    execution: sync
    affinity: main
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      properties:
        rop_path:
          type: string
