tools:
  - name: capture_viewport
    description: >-
      Capture the current Scene Viewer to an image file for a single frame via
      flipbook, with clamped resolution. UI-aware (headless returns a warning).
    source_file: scripts/capture_viewport.py
    execution: async
    affinity: main
    timeout_hint_secs: 120
    group: viewport
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [output_path]
      properties:
        output_path:
          type: string
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
          description: "[width, height], clamped to 4096."
        frame:
          type: number
  - name: flipbook
    description: >-
      Flipbook the current viewport across a frame range to image files (use a
      $F token in output_path). UI-aware.
    source_file: scripts/flipbook.py
    execution: async
    affinity: main
    timeout_hint_secs: 600
    group: viewport
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [output_path, frame_range]
      properties:
        output_path:
          type: string
          description: "Image path, ideally with a frame token e.g. /tmp/fb.$F4.jpg."
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
  - name: get_render_settings
    description: >-
      Read renderer, camera, resolution, frame range, output path, and image
      format from a ROP node. Read-only.
    source_file: scripts/get_render_settings.py
    execution: sync
    affinity: main
    group: render
    read_only: true
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
  - name: set_render_settings
    description: >-
      Set camera, resolution (clamped), frame range, output path, and image
      format on a ROP node. Reports unsupported fields for the ROP type.
    source_file: scripts/set_render_settings.py
    execution: sync
    affinity: main
    group: render
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        camera:
          type: string
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        output_path:
          type: string
        image_format:
          type: string
  - name: render_rop
    description: >-
      Render a ROP/output driver and report written files, elapsed time,
      warnings/errors. Async with a long timeout hint to avoid hanging the host.
    source_file: scripts/render_rop.py
    execution: async
    affinity: main
    timeout_hint_secs: 1800
    group: render
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [rop_path]
      properties:
        rop_path:
          type: string
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
