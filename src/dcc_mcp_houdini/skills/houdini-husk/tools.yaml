tools:
  - name: render_with_husk
    description: >-
      Render a USD file using the husk command-line renderer (Karma or other
      Hydra delegate). Supports frame range, resolution, and custom CLI args.
      Falls back to hython in-process rendering when husk binary is unavailable.
    source_file: scripts/render_with_husk.py
    execution: async
    affinity: main
    timeout_hint_secs: 3600
    group: render
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [usd_file, output_path]
      properties:
        usd_file:
          type: string
        output_path:
          type: string
        renderer:
          type: string
          default: karma
        frame:
          type: integer
        frame_range:
          type: array
          items: {type: number}
          minItems: 2
          maxItems: 3
        resolution:
          type: array
          items: {type: integer}
          minItems: 2
          maxItems: 2
        husk_args:
          type: array
          items: {type: string}
        use_hython_fallback:
          type: boolean
          default: false
  - name: create_checkpoint
    description: >-
      Create a render checkpoint for husk — save intermediate USD state for
      resume after interruption. Supports Solaris LOPs and file-based workflows.
    source_file: scripts/create_checkpoint.py
    execution: sync
    affinity: main
    group: checkpoint
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [usd_file, checkpoint_path]
      properties:
        usd_file:
          type: string
        checkpoint_path:
          type: string
        frame:
          type: integer
  - name: create_snapshot
    description: >-
      Export the current Solaris stage (/stage) or LOP network as a USD snapshot
      for husk command-line rendering. Uses usdsave LOP internally.
    source_file: scripts/create_snapshot.py
    execution: sync
    affinity: main
    group: checkpoint
    read_only: false
    destructive: false
    idempotent: false
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      properties:
        source_path:
          type: string
          default: /stage
        snapshot_path:
          type: string
          default: /tmp/husk_snapshot.usd
        flatten:
          type: boolean
          default: false
        frame:
          type: number
  - name: set_husk_options
    description: >-
      Configure or inspect husk command-line rendering options (renderer,
      threads, GPU, resolution, output, debug flags). Apply to LOP/ROP nodes
      or list the option catalog.
    source_file: scripts/set_husk_options.py
    execution: sync
    affinity: main
    group: options
    read_only: false
    destructive: false
    idempotent: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      properties:
        node_path:
          type: string
        options:
          type: object
          description: "Key-value pairs of husk CLI options to apply"
        list_options:
          type: boolean
          default: false
        category:
          type: string
          enum: [render, output, frame, debug, performance]
