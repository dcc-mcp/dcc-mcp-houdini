tools:
  - name: execute_python
    description: >-
      Execute a Python snippet inside Houdini. Mutates globals and may change the
      scene. Prefer typed houdini-scene / domain tools when available. Returns
      stdout, stderr, and optional `result` variable from the namespace.
    source_file: scripts/execute_python.py
    execution: sync
    affinity: main
    group: core
    read_only: false
    destructive: true
    idempotent: false
    tool_role: escape_hatch
    risk: host_script_execution
    search_aliases: [run python, execute code, eval, hython, arbitrary script, escape hatch]
    produces: [scene_state]
    annotations:
      destructive_hint: true
      read_only_hint: false
      idempotent_hint: false
    input_schema:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Python source executed in a namespace with `hou` pre-bound.
        context:
          type: object
          description: Optional extra names injected into the execution namespace.
          additionalProperties: true
  - name: get_session_info
    description: >-
      Read Houdini version, Python executable, UI availability, and current hip
      file path without modifying the scene.
    source_file: scripts/get_session_info.py
    execution: sync
    affinity: main
    group: diagnostics
    read_only: true
    destructive: false
    idempotent: true
    tool_role: read_only
    risk: low
    search_aliases: [session info, houdini version, hip path, ui availability]
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
    input_schema:
      type: object
      properties: {}
